<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>THE ARCHIVE</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/crt.css">
    <link rel="stylesheet" href="css/terminal.css">

</head>

<body>

<div class="terminal">

    <div class="header">

        <h1>THE ARCHIVE</h1>
        <p>Reality Preservation Division</p>

    </div>

    <div class="screen" id="gameScreen">

        <h2>NEXT DEPLOYMENT</h2>

        <br>

        <p>
            <strong>Timeline ID:</strong>
            <span id="timelineID"></span>
        </p>

        <p>
            <strong>Designation:</strong>
            <span id="timelineName"></span>
        </p>

        <br>

        <h3>Deployment Conditions</h3>

        <div id="deploymentConditions"></div>

        <br><br>

        <button id="deployButton">
            DEPLOY
        </button>

    </div>

    <!-- Asset Console Button -->

<button id="assetConsoleButton">
    🖥 ASSET CONSOLE
</button>


<!-- Asset Console Overlay -->

<div id="consoleScreen" class="hidden">

    <h2>ASSET CONSOLE</h2>


    <button id="profileButton">
        PROFILE
    </button>


    <button id="argusButton">

        <span id="argusButtonName">
            ARGUS
        </span>

    </button>


    <button id="timelineRecordButton">
        TIMELINE RECORDS
    </button>


    <button id="settingsButton">
        SETTINGS
    </button>


    <button id="closeConsole">
        CLOSE
    </button>


</div>


<!-- ARGUS Overlay -->

<div id="argusScreen" class="hidden">

    <h2 id="argusTitle">
        ARGUS
    </h2>


    <div id="argusDialogue">

    </div>

    

    <button id="closeArgus">
        CLOSE
    </button>


</div>



<script type="module" src="js/game.js"></script>

</body>

</html>
